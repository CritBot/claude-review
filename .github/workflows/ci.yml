name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

permissions:
  contents: read

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Lint
        run: go vet ./...

      - name: Run tests with race detector
        run: go test -race ./...

      - name: Generate coverage report
        run: make coverage

      - name: Check coverage threshold (40%)
        run: make coverage-check

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/coverage.out
          retention-days: 7

      - name: Post coverage summary
        run: |
          TOTAL=$(go tool cover -func=coverage/coverage.out | awk '/^total:/ {gsub(/%/, ""); print $3}')
          echo "### Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total coverage: ${TOTAL}%** (minimum: 40%)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|----------|" >> $GITHUB_STEP_SUMMARY
          go test -coverprofile=/dev/null -covermode=atomic ./internal/agents/... ./internal/diff/... ./internal/output/... 2>&1 | \
            awk '/coverage:/ {pkg=$1; cov=$NF; sub(/coverage:/, "", cov); printf "| %s | %s |\n", pkg, cov}' >> $GITHUB_STEP_SUMMARY

  build:
    name: Build (cross-platform)
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          go build -ldflags "-X main.version=ci" -o claude-review-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} ./cmd/claude-review
