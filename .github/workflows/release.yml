name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test-and-coverage:
    name: Tests & Coverage Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with race detector
        run: go test -race ./...

      - name: Check coverage threshold (40%)
        run: make coverage-check

  release:
    name: Build and Release
    runs-on: ubuntu-latest
    needs: test-and-coverage
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build all platforms
        run: make package
        env:
          CGO_ENABLED: 0

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/claude-review-darwin-amd64.tar.gz
            dist/claude-review-darwin-arm64.tar.gz
            dist/claude-review-linux-amd64.tar.gz
            dist/claude-review-linux-arm64.tar.gz
            dist/claude-review-windows-amd64.zip
            dist/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}

  update-homebrew-tap:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: critbot/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Download release assets
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE="https://github.com/critbot/claude-review/releases/download/${GITHUB_REF_NAME}"
          for f in claude-review-darwin-amd64.tar.gz claude-review-darwin-arm64.tar.gz \
                    claude-review-linux-amd64.tar.gz claude-review-linux-arm64.tar.gz; do
            curl -fsSL "$BASE/$f" -o "$f"
          done

      - name: Compute SHA256 checksums
        id: shas
        run: |
          echo "darwin_amd64=$(sha256sum claude-review-darwin-amd64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "darwin_arm64=$(sha256sum claude-review-darwin-arm64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux_amd64=$(sha256sum claude-review-linux-amd64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux_arm64=$(sha256sum claude-review-linux-arm64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Update formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/version \".*\"/version \"${VERSION}\"/" homebrew-tap/Formula/claude-review.rb
          sed -i "s/PLACEHOLDER_ARM64_SHA256/${{ steps.shas.outputs.darwin_arm64 }}/" homebrew-tap/Formula/claude-review.rb
          sed -i "s/PLACEHOLDER_AMD64_SHA256/${{ steps.shas.outputs.darwin_amd64 }}/" homebrew-tap/Formula/claude-review.rb
          sed -i "s/PLACEHOLDER_LINUX_ARM64_SHA256/${{ steps.shas.outputs.linux_arm64 }}/" homebrew-tap/Formula/claude-review.rb
          sed -i "s/PLACEHOLDER_LINUX_AMD64_SHA256/${{ steps.shas.outputs.linux_amd64 }}/" homebrew-tap/Formula/claude-review.rb

      - name: Commit and push tap update
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/claude-review.rb
          git commit -m "claude-review ${GITHUB_REF_NAME}"
          git push
